name: tf-brain

channels:
  - conda-forge
  - defaults

dependencies:
  # Python and environment tooling
  - python=3.9.23
  - pip=25.1.1
  - setuptools=80.9.0
  - wheel=0.45.1

  # Notebook runtime
  - jupyterlab=4.2.5
  - notebook=7.2.2
  - ipykernel=6.29.5

  # Data loading, analysis, and plotting
  - numpy=1.23.5
  - pandas=1.5.3
  - scipy=1.10.1
  - matplotlib=3.7.3
  - nibabel=5.2.1
  - pillow=10.4.0
  - h5py=3.7.0

  # TensorFlow 2.9 native-Windows GPU runtime
  - cudatoolkit=11.2
  - cudnn=8.1.0

  - pip:
      - tensorflow==2.9.0
      - keras==2.9.0
      - tensorboard==2.9.1
      - tensorflow-estimator==2.9.0
      - tensorflow-io-gcs-filesystem==0.31.0
      - tensorflow-addons==0.17.1
      - protobuf==3.19.6
      - keras-preprocessing==1.1.2
      - typeguard==2.13.3
      - wrapt==1.14.1
